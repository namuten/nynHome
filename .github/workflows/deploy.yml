name: Production Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to IP Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 서버 상의 nynHome 프로젝트 루트 디렉토리 생성 및 최초 복제(Clone) 자동화
            TARGET_PARENT="/home/tfsmaster/nagee"
            mkdir -p "$TARGET_PARENT"
            cd "$TARGET_PARENT"

            if [ ! -d "nynHome" ]; then
              echo "nynHome not found! Initiating automatic clone..."
              git clone git@github.com:namuten/nynHome.git || git clone https://github.com/namuten/nynHome.git
            fi

            cd nynHome

            echo "Current working directory: $(pwd)"

            # Git 최신화 및 강제 리셋 (main 브랜치 타겟)
            git fetch origin main
            git reset --hard origin/main

            # Docker Compose 빌드 및 강제 컨테이너 교체 재기동
            docker compose up -d --build --force-recreate
