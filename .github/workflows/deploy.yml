name: Production Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to IP Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 서버 상의 nynHome 프로젝트 루트 디렉터리 생성 및 최초 복제 자동화
            TARGET_PARENT="/home/tfsmaster/nagee"
            mkdir -p "$TARGET_PARENT"
            cd "$TARGET_PARENT"

            # 깃 레포 검증 및 복제 (HTTPS 전용)
            if [ ! -d "nynHome/.git" ]; then
              echo "nynHome/.git not found or corrupt! Cleaning up and initiating fresh automatic clone..."
              rm -rf nynHome
              git clone https://github.com/namuten/nynHome.git
            fi
            cd nynHome
            echo "Current working directory: $(pwd)"

            # .env 파일 자동 생성 (예시를 복사)
            if [ ! -f ".env" ]; then
              echo ".env 파일이 없으므로 .env.example 로부터 복사합니다."
              cp .env.example .env
            fi

            # Secrets 로부터 MySQL 환경 변수 삽입 (필요 시 추가)
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env

            # Cloudflare R2 환경 변수 주입 (추가)
            echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}" >> .env
            echo "R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}" >> .env
            echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> .env
            echo "R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}" >> .env
            echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}" >> .env

            # DATABASE_URL 자동 갱신 (기존 설정 삭제 후 Secrets 기반으로 주입)
            sed -i '/DATABASE_URL=/d' .env 2>/dev/null || sed -i '' '/DATABASE_URL=/d' .env
            echo "DATABASE_URL=mysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@db:3306/${{ secrets.MYSQL_DATABASE }}" >> .env

            # Git 최신화 및 강제 리셋 (main 브랜치 타겟)
            git fetch origin main
            git reset --hard origin/main

            # Docker Compose 빌드 및 강제 컨테이너 교체 재기동 (stale anonymous volume 갱신 포함)
            docker compose --env-file .env up -d --build --force-recreate --renew-anon-volumes

            # 데이터베이스 테이블 자동 생성 및 초기 데이터 적재 (추가)
            echo "데이터베이스 컨테이너 준비를 대기합니다..."
            sleep 15
            
            echo "Prisma 스키마를 데이터베이스에 동기화합니다 (테이블 생성)..."
            docker exec nynhome-api-1 npx prisma db push --accept-data-loss
            
            # echo "초기 마스터 및 샘플 데이터를 적재합니다 (시딩)..."
            # docker exec nynhome-api-1 npm run seed:all

