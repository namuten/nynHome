version: '3.8'

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # Nginx 프록시 내부에서만 통신하도록 외부 노출 포트 삭제 및 expose 처리
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: nynhome-nginx-1 # certbot의 컨테이너 타겟팅을 위해 이름 명시 고정
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: always

  # certbot 자동 갱신 서비스 (12시간 주기로 갱신 여부 검사)
  certbot:
    image: certbot/certbot:alpine # apk 사용을 위해 alpine 태그 명시
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      # nginx 컨테이너 갱신 훅(docker exec)을 작동시키기 위해 호스트의 도커 소켓 연결
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'apk add --no-cache docker-cli && trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet --deploy-hook \"docker exec nynhome-nginx-1 nginx -s reload\"; sleep 12h & wait $${!}; done'"
    restart: always

volumes:
  mysql_data:
