<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네트워크 연결 없음 — CrocHub</title>
  <style>
    :root {
      --background: #0f0f1a;
      --surface: #16162a;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .card {
      background-color: var(--surface);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 50px rgba(139, 92, 246, 0.05);
      backdrop-filter: blur(10px);
    }

    .icon-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      border: 2px solid rgba(239, 68, 68, 0.2);
    }

    .icon-wrapper svg {
      width: 48px;
      height: 48px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      border: none;
      outline: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #white;
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L8.464 8.464M5.636 18.364a9 9 0 010-12.728m0 0L8.464 8.464" />
      </svg>
    </div>
    <h1>네트워크 연결 없음</h1>
    <p>CrocHub에 접속하는 도중 네트워크 연결이 차단되었음을 감지했습니다. 연결 품질을 점검하신 후 다시 시도해 주십시오.</p>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="window.location.reload();">새로고침</button>
      <a href="/" class="btn btn-secondary">메인 홈으로 가기</a>
    </div>
  </div>
  <div class="footer">
    🐊 CrocHub Offline Resilience Core v1.1
  </div>
</body>
</html>
