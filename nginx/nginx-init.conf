# init-ssl.sh 전용 - 인증서 최초 발급용 HTTP only nginx
server {
    listen 80;
    server_name nynhome.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'init-ssl in progress';
        add_header Content-Type text/plain;
    }
}
