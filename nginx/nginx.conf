server {
    listen 80;

    # 1. API route proxying
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Dynamic XML Sitemap routing to backend
    location = /sitemap.xml {
        proxy_pass http://api:3000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Dynamic Robots.txt routing to backend
    location = /robots.txt {
        proxy_pass http://api:3000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. Vite Immutable Hashed Static Assets
    location /assets/ {
        proxy_pass http://frontend:80/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 5. Fallback HTML Entry Point & Single Page App routing
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Prevent browsers from caching index.html to ensure instant updates of assets
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
